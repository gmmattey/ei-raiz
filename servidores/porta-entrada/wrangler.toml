name = "ei-api-gateway"
main = "src/index.ts"
compatibility_date = "2026-04-09"

[[d1_databases]]
binding = "DB"
database_name = "esquilo-invest-dev"
database_id = "e2a0b0a8-484d-4507-b21c-facf090481dd"
preview_database_id = "e2a0b0a8-484d-4507-b21c-facf090481dd"
migrations_dir = "../../infra/banco/migrations"

# Cron triggers (handler `scheduled()` em src/index.ts diferencia via `event.cron`):
#   */5 * * * *  → refresh de cotações de mercado
#   0 3 * * *    → fechamento mensal D-1 em historico_carteira_mensal
[[triggers]]
crons = ["*/5 * * * *", "0 3 * * *"]
