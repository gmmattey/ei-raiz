version: '3.8'

services:
  # Esquilo Invest Frontend
  esquilo-web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: esquilo-invest-web
    ports:
      - "3000:3000"
    environment:
      - VITE_APP_NAME=Esquilo Invest
      - VITE_API_URL=http://localhost:3001
      - VITE_ENABLE_MOCK_DATA=true
      - VITE_ENABLE_DEV_TOOLS=true
      - NODE_ENV=development
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
    networks:
      - esquilo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  esquilo-network:
    driver: bridge
